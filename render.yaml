services:
  - type: web
    name: campus-chatbot
    runtime: node
    plan: free
    buildCommand: npm install --workspace backend
    startCommand: npm start --workspace backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: CLIENT_ORIGIN
        value: https://ai-campus-chatbot-frontend.vercel.app
      - key: PORT
        value: 10000
